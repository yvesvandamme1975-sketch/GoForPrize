name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'src/**'
      - 'ui/**'
      - 'assets/**'
      - 'requirements.txt'
      - 'GoForPrice.spec'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build single-file EXE
        run: pyinstaller GoForPrice.spec --clean --noconfirm

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoForPrice-Windows
          path: dist\GoForPrice.exe
          retention-days: 90

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: GoForPrice — Derniere version
          body: |
            Derniere version de GoForPrice.exe
            Telechargez le fichier ci-dessous et lancez-le sur Windows.
          files: dist/GoForPrice.exe
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
